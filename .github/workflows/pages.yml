name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure API endpoint
        env:
          HYPE_API_BASE_URL: ${{ vars.HYPE_API_BASE_URL || 'https://108-61-210-39.sslip.io' }}
        run: |
          node -e "const fs=require('fs'); const url=process.env.HYPE_API_BASE_URL; fs.writeFileSync('public/config.js', `window.HYPE_CONFIG = { apiBaseUrl: ${JSON.stringify(url)} };\n`);"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
